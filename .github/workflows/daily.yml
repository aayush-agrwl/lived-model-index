name: AMI — Daily Bootstrap

# Runs once per day at 01:00 UTC. Creates today's runs and queues
# response rows. Then immediately kicks off the first tick.
#
# NOTE: The /api/cron/daily Vercel cron (vercel.json) now also handles
# collection directly, so this GitHub Actions workflow is a supplementary
# fast-path. Even if SITE_URL is misconfigured here, Vercel's own cron
# will bootstrap + collect via the daily endpoint.
#
# Requires two repo-level secrets:
#   - CRON_SECRET: same value as on Vercel
#   - SITE_URL:    your Vercel production URL, e.g. https://ai-mood-index.vercel.app

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/daily
        # Why these curl flags:
        #   --max-time 310 must exceed Vercel's maxDuration=300 so curl
        #     doesn't abandon the connection while the function is still
        #     doing useful work (the previous --max-time 60 caused every
        #     daily-bootstrap workflow run to red-flag in GH Actions
        #     while the bootstrap actually succeeded server-side).
        #   No -f flag — we want to print the response body even on HTTP
        #     errors so the failure cause is visible in the Actions log
        #     instead of curl exiting 22 with no diagnostic.
        #   -sS keeps the run quiet on success but surfaces curl's own
        #     errors (DNS, TLS, connection-refused).
        #   Manual exit-on-status check below replaces the -f behaviour
        #     while still printing the body.
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/daily_body.json -w "%{http_code}" \
            -X POST "${SITE_URL}/api/cron/daily" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 310)
          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/daily_body.json || true
          echo
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Daily bootstrap returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
      - name: Kick off first tick
        # if: always() — even if the bootstrap step times out at curl
        # level, the Vercel function may have completed bootstrap and
        # we still want to drain the queue immediately. The tick is
        # idempotent (no work → no-op).
        if: always()
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/tick_body.json -w "%{http_code}" \
            -X POST "${SITE_URL}/api/cron/tick" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 310)
          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/tick_body.json || true
          echo
          # Don't fail the job if the tick step alone fails — the
          # supplementary every-10-min tick workflow will pick up.
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
